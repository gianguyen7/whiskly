<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Generate Whiskly Icons</title>
<style>
  body { font-family: system-ui; background: #f5f5f4; padding: 40px; text-align: center; }
  h1 { font-size: 20px; margin-bottom: 8px; }
  p { color: #71717a; font-size: 13px; margin-bottom: 32px; }
  .icons { display: flex; gap: 32px; justify-content: center; flex-wrap: wrap; margin-bottom: 32px; }
  .icon-box { background: white; border: 1px solid #e4e4e7; border-radius: 16px; padding: 24px; }
  .icon-box canvas { display: block; border-radius: 22%; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 12px; }
  .icon-box .label { font-size: 12px; font-weight: 600; color: #71717a; margin-bottom: 8px; }
  button { padding: 8px 20px; border-radius: 8px; border: 1px solid #0d9488; background: #0d9488; color: white; font-size: 13px; font-weight: 600; cursor: pointer; }
  button:hover { background: #0f766e; }
  .done { color: #0d9488; font-size: 13px; font-weight: 600; margin-top: 16px; }
  #favicon-box canvas { border-radius: 4px; image-rendering: pixelated; }
</style>
</head>
<body>

<h1>Whiskly Icon Generator</h1>
<p>Click each button to download. Icons render the brushstroke swirl on a teal (#0d9488) rounded-square background.</p>

<div class="icons">
  <div class="icon-box" id="box-16">
    <canvas id="c16" width="16" height="16"></canvas>
    <div class="label">favicon 16x16</div>
    <button onclick="download('c16','favicon-16x16.png')">Save</button>
  </div>
  <div class="icon-box" id="box-32">
    <canvas id="c32" width="32" height="32"></canvas>
    <div class="label">favicon 32x32</div>
    <button onclick="download('c32','favicon-32x32.png')">Save</button>
  </div>
  <div class="icon-box">
    <canvas id="c180" width="180" height="180"></canvas>
    <div class="label">apple-touch-icon 180x180</div>
    <button onclick="download('c180','apple-touch-icon.png')">Save</button>
  </div>
  <div class="icon-box">
    <canvas id="c192" width="192" height="192"></canvas>
    <div class="label">icon-192x192.png (PWA)</div>
    <button onclick="download('c192','icon-192x192.png')">Save</button>
  </div>
  <div class="icon-box">
    <canvas id="c512" width="512" height="512"></canvas>
    <div class="label">icon-512x512.png (PWA)</div>
    <button onclick="download('c512','icon-512x512.png')">Save</button>
  </div>
</div>

<button onclick="downloadAll()" style="padding:12px 32px;font-size:14px">Download All</button>
<div class="done" id="status"></div>

<script>
const sizes = [
  { id: 'c16', size: 16 },
  { id: 'c32', size: 32 },
  { id: 'c180', size: 180 },
  { id: 'c192', size: 192 },
  { id: 'c512', size: 512 },
];

function drawIcon(canvas, size) {
  const ctx = canvas.getContext('2d');
  const s = size;
  const r = s * 0.22; // corner radius for rounded square

  // Background: white rounded square
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(s - r, 0);
  ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r);
  ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s);
  ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.fill();

  // Draw the logo mark (white on teal) scaled to size
  // Logo viewBox is 58x64, we center it with padding
  const pad = s * 0.18;
  const logoW = s - pad * 2;
  const logoH = logoW * (64 / 58);
  const offsetX = pad;
  const offsetY = (s - logoH) / 2;

  ctx.save();
  ctx.translate(offsetX, offsetY);
  ctx.scale(logoW / 58, logoH / 64);

  // Outer arc
  ctx.fillStyle = 'rgba(127,178,46,1)';
  const outerPath = new Path2D('M14 5C13 4 11 5 11 7C-1 16-5 34 3 48C10 60 28 62 42 56C52 50 56 36 52 24C54 23 55 22 54 21C56 32 54 48 44 54C32 62 12 58 4 46C-4 34 0 16 14 6Z');
  ctx.fill(outerPath);

  // Middle arc
  ctx.fillStyle = 'rgba(127,178,46,0.5)';
  const midPath = new Path2D('M38 46C37 47 36 47 36 46C30 52 16 50 10 40C6 30 10 16 22 11C32 7 42 14 44 24C44 25 45 27 44 27C42 18 34 11 24 13C14 16 8 28 12 38C16 46 28 50 36 45Z');
  ctx.fill(midPath);

  // Inner arc
  ctx.fillStyle = 'rgba(127,178,46,0.28)';
  const innerPath = new Path2D('M34 28C35 27 35 26 34 26C34 22 28 18 22 18C16 20 14 28 16 34C18 40 24 42 30 40C31 40 31 39 30 39C26 40 20 38 18 34C16 28 18 22 22 20C28 18 32 22 33 27Z');
  ctx.fill(innerPath);

  // Center dot
  ctx.fillStyle = 'rgba(127,178,46,1)';
  ctx.beginPath();
  ctx.arc(26, 30, 3.5, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// Render all
sizes.forEach(({ id, size }) => {
  const canvas = document.getElementById(id);
  drawIcon(canvas, size);
});

function download(canvasId, filename) {
  const canvas = document.getElementById(canvasId);
  const link = document.createElement('a');
  link.download = filename;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function downloadAll() {
  const files = [
    ['c16', 'favicon-16x16.png'],
    ['c32', 'favicon-32x32.png'],
    ['c180', 'apple-touch-icon.png'],
    ['c192', 'icon-192x192.png'],
    ['c512', 'icon-512x512.png'],
  ];
  files.forEach(([id, name], i) => {
    setTimeout(() => download(id, name), i * 200);
  });
  document.getElementById('status').textContent = 'All 5 icons downloading! Move them to public/ when done.';
}
</script>
</body>
</html>
