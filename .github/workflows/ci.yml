name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # TODO: Add linter step after tech stack decision
      - run: echo "Lint step placeholder — configure after ADR-001"

  test:
    name: Test
    runs-on: ubuntu-latest
    # needs: lint  # Uncomment to gate tests on lint passing
    steps:
      - uses: actions/checkout@v4
      # TODO: Add test runner step after tech stack decision
      - run: echo "Test step placeholder — configure after ADR-001"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      # TODO: Add build step after tech stack decision
      - run: echo "Build step placeholder — configure after ADR-001"

